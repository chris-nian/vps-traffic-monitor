<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPS 管理面板</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e4e4e7;
            min-height: 100vh;
        }

        /* Login Overlay */
        .login-overlay {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-overlay.hidden { display: none; }

        .login-box {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 40px;
            width: 380px;
            backdrop-filter: blur(10px);
        }

        .login-box h2 {
            text-align: center;
            margin-bottom: 24px;
            background: linear-gradient(45deg, #00d9ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .login-box .form-group { margin-bottom: 16px; }

        .login-box label {
            display: block;
            margin-bottom: 6px;
            color: #a1a1aa;
            font-size: 0.9em;
        }

        .login-box input {
            width: 100%;
            padding: 10px 12px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            color: #e4e4e7;
            font-size: 1em;
        }

        .login-box input:focus {
            outline: none;
            border-color: #00d9ff;
        }

        .login-box .btn-login {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #00d9ff, #00ff88);
            border: none;
            border-radius: 8px;
            color: #1a1a2e;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
        }

        .login-box .btn-login:hover { opacity: 0.9; }

        .login-error {
            color: #ff6b6b;
            text-align: center;
            margin-top: 12px;
            font-size: 0.9em;
            min-height: 1.2em;
        }

        /* Admin Panel */
        .admin-panel { display: none; }
        .admin-panel.visible { display: block; }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            background: rgba(0,0,0,0.3);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .admin-header h1 {
            font-size: 1.4em;
            background: linear-gradient(45deg, #00d9ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .admin-header .user-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .admin-header .username { color: #a1a1aa; }

        .btn-logout, .btn-back {
            padding: 8px 16px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            color: #e4e4e7;
            cursor: pointer;
            font-size: 0.9em;
            text-decoration: none;
        }

        .btn-logout:hover, .btn-back:hover {
            background: rgba(255,255,255,0.2);
        }

        .admin-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
        }

        /* Port Management */
        .section {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .section h2 {
            margin-bottom: 20px;
            color: #e4e4e7;
            font-size: 1.3em;
        }

        .port-actions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }

        .port-form {
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            padding: 20px;
        }

        .port-form h3 {
            margin-bottom: 16px;
            font-size: 1.1em;
        }

        .port-form.open-form h3 { color: #00ff88; }
        .port-form.close-form h3 { color: #ff6b6b; }

        .form-group { margin-bottom: 16px; }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: #a1a1aa;
            font-size: 0.9em;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 10px 12px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            color: #e4e4e7;
            font-size: 1em;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #00d9ff;
        }

        .btn {
            width: 100%;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
        }

        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-primary {
            background: linear-gradient(135deg, #00d9ff, #00ff88);
            color: #1a1a2e;
        }

        .btn-danger {
            background: linear-gradient(135deg, #ff6b6b, #ff8e8e);
            color: #1a1a2e;
        }

        .port-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            margin-bottom: 8px;
        }

        .port-item .port-info { display: flex; align-items: center; gap: 8px; }

        .port-number {
            font-size: 1.2em;
            font-weight: bold;
            color: #00d9ff;
        }

        .port-protocol {
            background: rgba(0,217,255,0.2);
            color: #00d9ff;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.85em;
        }

        .badge-protected {
            background: rgba(255,217,61,0.2);
            color: #ffd93d;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75em;
        }

        .btn-close-port {
            padding: 6px 14px;
            background: rgba(255,107,107,0.2);
            border: 1px solid rgba(255,107,107,0.4);
            border-radius: 6px;
            color: #ff6b6b;
            cursor: pointer;
            font-size: 0.85em;
        }

        .btn-close-port:hover {
            background: rgba(255,107,107,0.4);
        }

        /* Audit Logs */
        .audit-entry {
            padding: 12px 16px;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 0.9em;
        }

        .audit-entry .action { font-weight: bold; margin-bottom: 4px; }
        .audit-entry .action.open { color: #00ff88; }
        .audit-entry .action.close { color: #ff6b6b; }
        .audit-entry .action.blocked { color: #ffd93d; }
        .audit-entry .meta { color: #71717a; font-size: 0.85em; margin-top: 4px; }

        /* Toast */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 14px 24px;
            border-radius: 8px;
            font-weight: 500;
            z-index: 2000;
            animation: slideIn 0.3s ease;
        }

        .toast.success { background: linear-gradient(135deg, #00ff88, #00d9ff); color: #1a1a2e; }
        .toast.error { background: linear-gradient(135deg, #ff6b6b, #ff8e8e); color: #1a1a2e; }

        @keyframes slideIn {
            from { transform: translateX(400px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .empty-state {
            text-align: center;
            color: #a1a1aa;
            padding: 20px;
        }
    </style>
</head>
<body>

    <!-- Login Overlay -->
    <div class="login-overlay" id="login-overlay">
        <div class="login-box">
            <h2>VPS 管理面板</h2>
            <form id="login-form">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="login-username" autocomplete="username" required>
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="login-password" autocomplete="current-password" required>
                </div>
                <button type="submit" class="btn-login">登录</button>
            </form>
            <div class="login-error" id="login-error"></div>
        </div>
    </div>

    <!-- Admin Panel (hidden until login) -->
    <div class="admin-panel" id="admin-panel">
        <div class="admin-header">
            <h1>VPS 管理面板</h1>
            <div class="user-info">
                <a href="/" class="btn-back">返回监控</a>
                <span class="username" id="display-username"></span>
                <button class="btn-logout" onclick="logout()">退出登录</button>
            </div>
        </div>

        <div class="admin-content">
            <!-- Port Management -->
            <div class="section">
                <h2>端口管理</h2>

                <div class="port-actions">
                    <div class="port-form open-form">
                        <h3>开放端口</h3>
                        <div class="form-group">
                            <label>端口号</label>
                            <input type="number" id="open-port" min="1" max="65535" placeholder="1-65535">
                        </div>
                        <div class="form-group">
                            <label>协议</label>
                            <select id="open-protocol">
                                <option value="tcp">TCP</option>
                                <option value="udp">UDP</option>
                            </select>
                        </div>
                        <button class="btn btn-primary" onclick="openPort()">开放端口</button>
                    </div>

                    <div class="port-form close-form">
                        <h3>关闭端口</h3>
                        <div class="form-group">
                            <label>端口号</label>
                            <input type="number" id="close-port" min="1" max="65535" placeholder="1-65535">
                        </div>
                        <div class="form-group">
                            <label>协议</label>
                            <select id="close-protocol">
                                <option value="tcp">TCP</option>
                                <option value="udp">UDP</option>
                            </select>
                        </div>
                        <button class="btn btn-danger" onclick="closePort()">关闭端口</button>
                    </div>
                </div>

                <h3 style="margin-bottom: 12px; color: #e4e4e7;">当前开放的端口</h3>
                <div id="ports-container">
                    <div class="empty-state">加载中...</div>
                </div>
            </div>

            <!-- Audit Logs -->
            <div class="section">
                <h2>操作日志</h2>
                <div id="audit-container">
                    <div class="empty-state">加载中...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ---- Auth ----
        async function checkAuth() {
            try {
                const res = await fetch('/api/auth/check');
                if (res.ok) {
                    const data = await res.json();
                    showAdmin(data.username);
                }
            } catch (e) { /* not logged in */ }
        }

        function showAdmin(username) {
            document.getElementById('login-overlay').classList.add('hidden');
            document.getElementById('admin-panel').classList.add('visible');
            document.getElementById('display-username').textContent = username;
            loadPorts();
            loadAuditLogs();
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;
            const errorEl = document.getElementById('login-error');
            errorEl.textContent = '';

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();

                if (data.success) {
                    showAdmin(username);
                } else {
                    errorEl.textContent = data.message;
                }
            } catch (err) {
                errorEl.textContent = '登录失败，请稍后重试';
            }
        });

        async function logout() {
            await fetch('/api/logout', { method: 'POST' });
            document.getElementById('login-overlay').classList.remove('hidden');
            document.getElementById('admin-panel').classList.remove('visible');
            document.getElementById('login-password').value = '';
        }

        // ---- Port Management ----
        const PROTECTED_PORTS = [22, 80, 443];

        async function loadPorts() {
            try {
                const res = await fetch('/api/firewall/ports');
                if (res.status === 401) return;
                const data = await res.json();
                renderPorts(data.ports || []);
            } catch (e) {
                document.getElementById('ports-container').innerHTML =
                    '<div class="empty-state" style="color:#ff6b6b;">加载失败</div>';
            }
        }

        function renderPorts(ports) {
            const container = document.getElementById('ports-container');
            if (!ports.length) {
                container.innerHTML = '<div class="empty-state">暂无开放端口</div>';
                return;
            }

            container.innerHTML = ports.map(p => {
                const isProtected = PROTECTED_PORTS.includes(p.port);
                return `<div class="port-item">
                    <div class="port-info">
                        <span class="port-number">${p.port}</span>
                        <span class="port-protocol">${p.protocol}</span>
                        ${isProtected ? '<span class="badge-protected">受保护</span>' : ''}
                    </div>
                    ${isProtected ? '' : `<button class="btn-close-port" onclick="closePortByBtn(${p.port},'${p.protocol}')">关闭</button>`}
                </div>`;
            }).join('');
        }

        async function openPort() {
            const portEl = document.getElementById('open-port');
            const port = parseInt(portEl.value);
            const protocol = document.getElementById('open-protocol').value;

            if (!port || port < 1 || port > 65535) {
                return showToast('请输入有效的端口号 (1-65535)', 'error');
            }

            try {
                const res = await fetch('/api/firewall/open-port', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ port, protocol })
                });
                const data = await res.json();
                showToast(data.message, data.success ? 'success' : 'error');
                if (data.success) { portEl.value = ''; loadPorts(); loadAuditLogs(); }
            } catch (e) {
                showToast('操作失败', 'error');
            }
        }

        async function closePort() {
            const portEl = document.getElementById('close-port');
            const port = parseInt(portEl.value);
            const protocol = document.getElementById('close-protocol').value;

            if (!port || port < 1 || port > 65535) {
                return showToast('请输入有效的端口号 (1-65535)', 'error');
            }

            await doClosePort(port, protocol);
            portEl.value = '';
        }

        async function closePortByBtn(port, protocol) {
            if (!confirm(`确定要关闭端口 ${port}/${protocol} 吗？`)) return;
            await doClosePort(port, protocol);
        }

        async function doClosePort(port, protocol) {
            try {
                const res = await fetch('/api/firewall/close-port', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ port, protocol })
                });
                const data = await res.json();
                showToast(data.message, data.success ? 'success' : 'error');
                if (data.success) { loadPorts(); loadAuditLogs(); }
            } catch (e) {
                showToast('操作失败', 'error');
            }
        }

        // ---- Audit Logs ----
        async function loadAuditLogs() {
            try {
                const res = await fetch('/api/firewall/audit-logs');
                if (res.status === 401) return;
                const data = await res.json();
                renderAuditLogs(data.logs || []);
            } catch (e) { /* ignore */ }
        }

        function renderAuditLogs(logs) {
            const container = document.getElementById('audit-container');
            if (!logs.length) {
                container.innerHTML = '<div class="empty-state">暂无操作日志</div>';
                return;
            }

            container.innerHTML = logs.slice(-20).reverse().map(log => {
                const cls = log.action.includes('BLOCKED') ? 'blocked' :
                            log.action.includes('CLOSE') ? 'close' : 'open';
                const details = log.details || {};
                return `<div class="audit-entry">
                    <div class="action ${cls}">${log.action} - 端口 ${details.port || '?'}/${details.protocol || '?'}</div>
                    <div class="meta">${log.timestamp} | 用户: ${log.username}</div>
                </div>`;
            }).join('');
        }

        // ---- Toast ----
        function showToast(msg, type) {
            const el = document.createElement('div');
            el.className = 'toast ' + type;
            el.textContent = msg;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 3000);
        }

        // ---- Init ----
        checkAuth();
        setInterval(() => { loadPorts(); loadAuditLogs(); }, 30000);
    </script>
</body>
</html>
