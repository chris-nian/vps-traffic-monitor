<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修改密码 - VPS 流量监控</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e4e4e7;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .change-password-container {
            width: 100%;
            max-width: 480px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            backdrop-filter: blur(20px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2em;
            background: linear-gradient(45deg, #00d9ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .header p {
            color: #a1a1aa;
            font-size: 0.95em;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #a1a1aa;
            font-size: 0.9em;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: #e4e4e7;
            font-size: 1em;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #00d9ff;
            box-shadow: 0 0 0 3px rgba(0, 217, 255, 0.1);
        }

        .form-group input::placeholder {
            color: #71717a;
        }

        .password-container {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #71717a;
            cursor: pointer;
            font-size: 1.2em;
            padding: 4px;
            transition: color 0.3s;
        }

        .toggle-password:hover {
            color: #a1a1aa;
        }

        .password-strength {
            margin-top: 8px;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.85em;
            display: none;
        }

        .password-strength.show {
            display: block;
        }

        .password-strength.weak {
            background: rgba(255, 107, 107, 0.1);
            border: 1px solid rgba(255, 107, 107, 0.3);
            color: #ff6b6b;
        }

        .password-strength.medium {
            background: rgba(255, 211, 61, 0.1);
            border: 1px solid rgba(255, 211, 61, 0.3);
            color: #ffd93d;
        }

        .password-strength.strong {
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid rgba(0, 255, 136, 0.3);
            color: #00ff88;
        }

        .change-button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #00d9ff 0%, #00ff88 100%);
            border: none;
            border-radius: 10px;
            color: #1a1a2e;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 8px;
        }

        .change-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 217, 255, 0.4);
        }

        .change-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .message {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9em;
            display: none;
        }

        .message.show {
            display: block;
            animation: slideIn 0.3s ease;
        }

        .message.error {
            background: rgba(255, 107, 107, 0.1);
            border: 1px solid rgba(255, 107, 107, 0.3);
            color: #ff6b6b;
        }

        .message.success {
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid rgba(0, 255, 136, 0.3);
            color: #00ff88;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .shake {
            animation: shake 0.5s;
        }

        .back-link {
            text-align: center;
            margin-top: 24px;
        }

        .back-link a {
            color: #a1a1aa;
            text-decoration: none;
            font-size: 0.9em;
            transition: color 0.3s;
        }

        .back-link a:hover {
            color: #00d9ff;
        }

        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #1a1a2e;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .requirements {
            background: rgba(0, 217, 255, 0.1);
            border: 1px solid rgba(0, 217, 255, 0.3);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 20px;
            font-size: 0.85em;
        }

        .requirements h3 {
            color: #00d9ff;
            margin-bottom: 8px;
            font-size: 1em;
        }

        .requirements ul {
            list-style-position: inside;
            color: #a1a1aa;
            line-height: 1.6;
        }

        .requirements li {
            margin-bottom: 4px;
        }

        .requirements li.valid {
            color: #00ff88;
        }

        .requirements li.invalid {
            color: #ff6b6b;
        }
    </style>
</head>
<body>
    <div class="change-password-container">
        <div class="header">
            <h1>🔐 修改管理员密码</h1>
            <p>请定期修改密码以确保系统安全</p>
        </div>

        <div id="message" class="message"></div>

        <div class="requirements">
            <h3>密码要求：</h3>
            <ul id="requirements-list">
                <li id="req-length">至少 12 个字符</li>
                <li id="req-uppercase">包含大写字母</li>
                <li id="req-lowercase">包含小写字母</li>
                <li id="req-number">包含数字</li>
                <li id="req-special">包含特殊字符 (!@#$%^&*)</li>
            </ul>
        </div>

        <form id="change-password-form">
            <div class="form-group">
                <label for="current-password">当前密码</label>
                <div class="password-container">
                    <input
                        type="password"
                        id="current-password"
                        placeholder="请输入当前密码"
                        required
                        autocomplete="current-password"
                    >
                    <button
                        type="button"
                        class="toggle-password"
                        onclick="togglePasswordVisibility('current-password')"
                        title="显示/隐藏密码"
                    >👁️</button>
                </div>
            </div>

            <div class="form-group">
                <label for="new-password">新密码</label>
                <div class="password-container">
                    <input
                        type="password"
                        id="new-password"
                        placeholder="请输入新密码"
                        required
                        autocomplete="new-password"
                    >
                    <button
                        type="button"
                        class="toggle-password"
                        onclick="togglePasswordVisibility('new-password')"
                        title="显示/隐藏密码"
                    >👁️</button>
                </div>
                <div id="password-strength" class="password-strength"></div>
            </div>

            <div class="form-group">
                <label for="confirm-password">确认新密码</label>
                <div class="password-container">
                    <input
                        type="password"
                        id="confirm-password"
                        placeholder="请再次输入新密码"
                        required
                        autocomplete="new-password"
                    >
                    <button
                        type="button"
                        class="toggle-password"
                        onclick="togglePasswordVisibility('confirm-password')"
                        title="显示/隐藏密码"
                    >👁️</button>
                </div>
            </div>

            <button type="submit" class="change-button" id="change-button">
                修改密码
            </button>
        </form>

        <div class="back-link">
            <a href="/firewall-rules.html">← 返回防火墙规则管理</a>
        </div>
    </div>

    <script>
        const changePasswordForm = document.getElementById('change-password-form');
        const changeButton = document.getElementById('change-button');
        const messageDiv = document.getElementById('message');
        const newPasswordInput = document.getElementById('new-password');
        const confirmPasswordInput = document.getElementById('confirm-password');
        const passwordStrengthDiv = document.getElementById('password-strength');
        const requirementsList = {
            length: document.getElementById('req-length'),
            uppercase: document.getElementById('req-uppercase'),
            lowercase: document.getElementById('req-lowercase'),
            number: document.getElementById('req-number'),
            special: document.getElementById('req-special')
        };

        // Toggle password visibility
        function togglePasswordVisibility(inputId) {
            const input = document.getElementById(inputId);
            const button = input.nextElementSibling;

            if (input.type === 'password') {
                input.type = 'text';
                button.textContent = '🙈';
            } else {
                input.type = 'password';
                button.textContent = '👁️';
            }
        }

        // Check password strength
        function checkPasswordStrength(password) {
            let strength = 0;
            const requirements = {
                length: password.length >= 12,
                uppercase: /[A-Z]/.test(password),
                lowercase: /[a-z]/.test(password),
                number: /\d/.test(password),
                special: /[!@#$%^&*(),.?":{}|<>]/.test(password)
            };

            // Update requirements list
            for (const [key, valid] of Object.entries(requirements)) {
                if (requirementsList[key]) {
                    requirementsList[key].classList.toggle('valid', valid);
                    requirementsList[key].classList.toggle('invalid', !valid);
                }
            }

            strength = Object.values(requirements).filter(Boolean).length;

            let strengthText, strengthClass;
            if (strength <= 2) {
                strengthText = '弱 - 建议使用更复杂的密码';
                strengthClass = 'weak';
            } else if (strength <= 3) {
                strengthText = '中等 - 可以更好';
                strengthClass = 'medium';
            } else if (strength <= 4) {
                strengthText = '强 - 良好的密码';
                strengthClass = 'strong';
            } else {
                strengthText = '非常强 - 优秀的密码';
                strengthClass = 'strong';
            }

            passwordStrengthDiv.textContent = `密码强度: ${strengthText}`;
            passwordStrengthDiv.className = `password-strength show ${strengthClass}`;

            return strength >= 3; // Require at least medium strength
        }

        // Show message
        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.className = `message ${type} show`;

            if (type === 'error') {
                messageDiv.classList.add('shake');
                setTimeout(() => messageDiv.classList.remove('shake'), 500);
            }

            setTimeout(() => {
                messageDiv.classList.remove('show');
            }, 5000);
        }

        // Real-time password strength check
        newPasswordInput.addEventListener('input', () => {
            if (newPasswordInput.value) {
                checkPasswordStrength(newPasswordInput.value);
            } else {
                passwordStrengthDiv.classList.remove('show');
                // Reset requirements
                Object.values(requirementsList).forEach(req => {
                    req.classList.remove('valid', 'invalid');
                });
            }
        });

        // Form submission
        changePasswordForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const currentPassword = document.getElementById('current-password').value;
            const newPassword = newPasswordInput.value;
            const confirmPassword = confirmPasswordInput.value;

            // Validate passwords match
            if (newPassword !== confirmPassword) {
                showMessage('新密码和确认密码不匹配', 'error');
                return;
            }

            // Check password strength
            if (!checkPasswordStrength(newPassword)) {
                showMessage('密码强度不足，请使用更强的密码', 'error');
                return;
            }

            // Check if new password is same as current
            if (currentPassword === newPassword) {
                showMessage('新密码不能与当前密码相同', 'error');
                return;
            }

            // Disable button and show loading
            changeButton.disabled = true;
            changeButton.innerHTML = '<span class="loading-spinner"></span>处理中...';

            try {
                const response = await fetch('/api/change-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        currentPassword,
                        newPassword
                    })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    showMessage('密码修改成功！请使用新密码重新登录', 'success');

                    // Clear form
                    changePasswordForm.reset();
                    passwordStrengthDiv.classList.remove('show');
                    Object.values(requirementsList).forEach(req => {
                        req.classList.remove('valid', 'invalid');
                    });

                    // Redirect to login after 2 seconds
                    setTimeout(() => {
                        window.location.href = '/login.html';
                    }, 2000);
                } else {
                    showMessage(data.message || '密码修改失败', 'error');
                    changeButton.disabled = false;
                    changeButton.textContent = '修改密码';
                }
            } catch (error) {
                console.error('Password change error:', error);
                showMessage('网络错误，请稍后重试', 'error');
                changeButton.disabled = false;
                changeButton.textContent = '修改密码';
            }
        });

        // Check authentication on page load
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const response = await fetch('/api/auth/check');
                if (!response.ok) {
                    window.location.href = '/login.html?redirect=' + encodeURIComponent(window.location.pathname);
                }
            } catch (error) {
                console.error('Auth check failed:', error);
                window.location.href = '/login.html?redirect=' + encodeURIComponent(window.location.pathname);
            }
        });
    </script>
</body>
</html>
