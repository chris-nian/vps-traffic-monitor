<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>防火墙规则管理 - VPS 流量监控</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e4e4e7;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header h1 {
            font-size: 2em;
            background: linear-gradient(45deg, #00d9ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .user-info {
            color: #a1a1aa;
            font-size: 0.9em;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 0.9em;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00d9ff 0%, #00ff88 100%);
            color: #1a1a2e;
            font-weight: 600;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 217, 255, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #e4e4e7;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .filter-bar {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-group label {
            color: #a1a1aa;
            font-size: 0.9em;
        }

        .filter-group select,
        .filter-group input {
            padding: 8px 12px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            color: #e4e4e7;
            font-size: 0.9em;
        }

        .filter-group select:focus,
        .filter-group input:focus {
            outline: none;
            border-color: #00d9ff;
        }

        .stats-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
        }

        .stat-card .label {
            color: #a1a1aa;
            font-size: 0.85em;
            margin-bottom: 8px;
        }

        .stat-card .value {
            font-size: 1.8em;
            font-weight: bold;
            color: #e4e4e7;
        }

        .stat-card.total { border-left: 4px solid #00d9ff; }
        .stat-card.input { border-left: 4px solid #00ff88; }
        .stat-card.output { border-left: 4px solid #ffd93d; }
        .stat-card.forward { border-left: 4px solid #ff6b6b; }

        .rules-container {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
        }

        .rules-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .rules-header h2 {
            font-size: 1.3em;
            color: #e4e4e7;
        }

        .chain-section {
            margin-bottom: 30px;
        }

        .chain-title {
            font-size: 1.1em;
            color: #00d9ff;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 2px solid rgba(0, 217, 255, 0.3);
        }

        .chain-title INPUT {
            color: #00ff88;
        }

        .chain-title FORWARD {
            color: #ffd93d;
        }

        .rules-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9em;
        }

        .rules-table thead {
            background: rgba(0, 0, 0, 0.3);
        }

        .rules-table th {
            padding: 12px;
            text-align: left;
            color: #a1a1aa;
            font-weight: 600;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .rules-table td {
            padding: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .rules-table tbody tr:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .rule-number {
            color: #71717a;
            font-weight: 600;
            width: 60px;
        }

        .target {
            font-weight: 600;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.85em;
            display: inline-block;
        }

        .target.ACCEPT {
            background: rgba(0, 255, 136, 0.2);
            color: #00ff88;
        }

        .target.DROP {
            background: rgba(255, 107, 107, 0.2);
            color: #ff6b6b;
        }

        .target.REJECT {
            background: rgba(255, 107, 107, 0.2);
            color: #ff6b6b;
        }

        .target.LOG {
            background: rgba(0, 217, 255, 0.2);
            color: #00d9ff;
        }

        .target.default {
            background: rgba(255, 255, 255, 0.1);
            color: #a1a1aa;
        }

        .protocol {
            color: #ffd93d;
            font-weight: 600;
            text-transform: uppercase;
        }

        .address {
            font-family: 'Courier New', monospace;
            color: #00d9ff;
        }

        .port {
            color: #00ff88;
            font-weight: 600;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #a1a1aa;
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #a1a1aa;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #00d9ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .raw-rules {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
        }

        .raw-rules h2 {
            margin-bottom: 16px;
            color: #e4e4e7;
        }

        .raw-output {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 16px;
            font-family: 'Courier New', monospace;
            font-size: 0.85em;
            color: #a1a1aa;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 400px;
            overflow-y: auto;
        }

        .info-box {
            background: rgba(0, 217, 255, 0.1);
            border: 1px solid rgba(0, 217, 255, 0.3);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 20px;
            font-size: 0.9em;
        }

        .info-box .title {
            font-weight: 600;
            color: #00d9ff;
            margin-bottom: 8px;
        }

        .info-box ul {
            list-style-position: inside;
            color: #a1a1aa;
        }

        .info-box li {
            margin-bottom: 4px;
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 16px;
            }

            .rules-table {
                font-size: 0.8em;
            }

            .filter-bar {
                flex-direction: column;
                align-items: stretch;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🛡️ 防火墙规则管理</h1>
            <div class="header-actions">
                <span class="user-info">管理员: <span id="username">--</span></span>
                <a href="/" class="btn btn-secondary">返回监控</a>
                <a href="/change-password.html" class="btn btn-secondary">🔑 修改密码</a>
                <button onclick="logout()" class="btn btn-primary">退出登录</button>
            </div>
        </div>

        <div class="info-box">
            <div class="title">ℹ️ 防火墙规则信息</div>
            <ul>
                <li>此页面显示当前系统的 iptables 防火墙规则</li>
                <li>规则按链（Chain）组织：INPUT（入站）、OUTPUT（出站）、FORWARD（转发）</li>
                <li>建议定期审查规则以确保安全性</li>
            </ul>
        </div>

        <div class="stats-summary">
            <div class="stat-card total">
                <div class="label">总规则数</div>
                <div class="value" id="total-rules">--</div>
            </div>
            <div class="stat-card input">
                <div class="label">INPUT 链</div>
                <div class="value" id="input-rules">--</div>
            </div>
            <div class="stat-card output">
                <div class="label">OUTPUT 链</div>
                <div class="value" id="output-rules">--</div>
            </div>
            <div class="stat-card forward">
                <div class="label">FORWARD 链</div>
                <div class="value" id="forward-rules">--</div>
            </div>
        </div>

        <div class="filter-bar">
            <div class="filter-group">
                <label>筛选链:</label>
                <select id="chain-filter" onchange="renderRules()">
                    <option value="all">全部</option>
                    <option value="INPUT">INPUT</option>
                    <option value="OUTPUT">OUTPUT</option>
                    <option value="FORWARD">FORWARD</option>
                </select>
            </div>
            <div class="filter-group">
                <label>筛选目标:</label>
                <select id="target-filter" onchange="renderRules()">
                    <option value="all">全部</option>
                    <option value="ACCEPT">ACCEPT</option>
                    <option value="DROP">DROP</option>
                    <option value="REJECT">REJECT</option>
                    <option value="LOG">LOG</option>
                </select>
            </div>
            <div class="filter-group">
                <button class="btn btn-secondary" onclick="refreshRules()">🔄 刷新规则</button>
            </div>
        </div>

        <div class="rules-container">
            <div class="rules-header">
                <h2>📋 防火墙规则列表</h2>
            </div>
            <div id="rules-content">
                <div class="loading">
                    <div class="loading-spinner"></div>
                    <p>加载防火墙规则中...</p>
                </div>
            </div>
        </div>

        <div class="raw-rules">
            <h2>💻 原始规则输出</h2>
            <div id="raw-output" class="raw-output">
                加载中...
            </div>
        </div>
    </div>

    <script>
        let firewallData = null;

        // Check authentication on page load
        document.addEventListener('DOMContentLoaded', async () => {
            await checkAuth();
            await loadFirewallRules();
        });

        // Check if user is authenticated
        async function checkAuth() {
            try {
                const response = await fetch('/api/auth/check');
                if (!response.ok) {
                    window.location.href = '/login.html?redirect=' + encodeURIComponent(window.location.pathname);
                    return false;
                }

                const data = await response.json();
                document.getElementById('username').textContent = data.username || '管理员';
                return true;
            } catch (error) {
                console.error('Auth check failed:', error);
                window.location.href = '/login.html?redirect=' + encodeURIComponent(window.location.pathname);
                return false;
            }
        }

        // Load firewall rules
        async function loadFirewallRules() {
            try {
                const response = await fetch('/api/firewall/rules');
                if (!response.ok) {
                    throw new Error('Failed to load firewall rules');
                }

                const data = await response.json();
                firewallData = data;
                updateStats(data);
                renderRules();
                document.getElementById('raw-output').textContent = data.raw || '无原始输出';
            } catch (error) {
                console.error('Error loading firewall rules:', error);
                showError('加载防火墙规则失败: ' + error.message);
            }
        }

        // Update statistics
        function updateStats(data) {
            const stats = data.stats || { total: 0, INPUT: 0, OUTPUT: 0, FORWARD: 0 };
            document.getElementById('total-rules').textContent = stats.total || 0;
            document.getElementById('input-rules').textContent = stats.INPUT || 0;
            document.getElementById('output-rules').textContent = stats.OUTPUT || 0;
            document.getElementById('forward-rules').textContent = stats.FORWARD || 0;
        }

        // Render rules table
        function renderRules() {
            if (!firewallData || !firewallData.chains) {
                return;
            }

            const chainFilter = document.getElementById('chain-filter').value;
            const targetFilter = document.getElementById('target-filter').value;
            const container = document.getElementById('rules-content');

            let html = '';

            for (const [chainName, chainData] of Object.entries(firewallData.chains)) {
                if (chainFilter !== 'all' && chainFilter !== chainName) {
                    continue;
                }

                const rules = chainData.rules || [];
                const policy = chainData.policy || '-';

                let filteredRules = rules;
                if (targetFilter !== 'all') {
                    filteredRules = rules.filter(rule => rule.target === targetFilter);
                }

                if (filteredRules.length === 0 && (targetFilter !== 'all' || rules.length === 0)) {
                    continue;
                }

                html += `
                    <div class="chain-section">
                        <div class="chain-title ${chainName}">
                            ${chainName} 链 (默认策略: ${policy})
                        </div>
                        <table class="rules-table">
                            <thead>
                                <tr>
                                    <th>序号</th>
                                    <th>目标</th>
                                    <th>协议</th>
                                    <th>源地址</th>
                                    <th>目标地址</th>
                                    <th>端口</th>
                                    <th>选项</th>
                                </tr>
                            </thead>
                            <tbody>
                `;

                for (const rule of filteredRules) {
                    html += `
                        <tr>
                            <td class="rule-number">${rule.num || '-'}</td>
                            <td><span class="target ${rule.target || 'default'}">${rule.target || '-'}</span></td>
                            <td class="protocol">${rule.prot || 'all'}</td>
                            <td class="address">${rule.source || '-'}</td>
                            <td class="address">${rule.destination || '-'}</td>
                            <td class="port">${rule.dport || (rule.sport || '-')}</td>
                            <td>${rule.options || '-'}</td>
                        </tr>
                    `;
                }

                html += `
                            </tbody>
                        </table>
                    </div>
                `;
            }

            if (html === '') {
                html = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                        </svg>
                        <h3>没有找到匹配的防火墙规则</h3>
                        <p>请尝试调整筛选条件</p>
                    </div>
                `;
            }

            container.innerHTML = html;
        }

        // Refresh rules
        function refreshRules() {
            loadFirewallRules();
        }

        // Logout
        async function logout() {
            try {
                await fetch('/api/logout', { method: 'POST' });
                window.location.href = '/';
            } catch (error) {
                console.error('Logout error:', error);
                window.location.href = '/';
            }
        }

        // Show error message
        function showError(message) {
            const container = document.getElementById('rules-content');
            container.innerHTML = `
                <div style="text-align: center; padding: 40px; color: #ff6b6b;">
                    <h3>⚠️ 错误</h3>
                    <p>${message}</p>
                    <button onclick="loadFirewallRules()" class="btn btn-secondary" style="margin-top: 16px;">
                        重试
                    </button>
                </div>
            `;
        }
    </script>
</body>
</html>
